<!doctype html>
<html>
    <head>
        <title>3D Racing Game 🏎️</title>

        <style>
            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0;
                overflow: hidden;
            }

            #game {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>

    <body>
        <canvas id="game"></canvas>

        <script src="https://cdn.babylonjs.com/babylon.js"></script>

        <script>
            const canvas = document.getElementById('game');

            const engine = new BABYLON.Engine(canvas, true);

            // Create Scene
            const createScene = function () {
                const scene = new BABYLON.Scene(engine);

                // Camera
                const camera = new BABYLON.FollowCamera(
                    'camera',
                    new BABYLON.Vector3(0, 5, -10),
                    scene,
                );

                camera.radius = 10;
                camera.heightOffset = 5;
                camera.rotationOffset = 180;

                // Light
                const light = new BABYLON.HemisphericLight(
                    'light',
                    new BABYLON.Vector3(0, 1, 0),
                    scene,
                );

                // Ground
                const ground = BABYLON.MeshBuilder.CreateGround(
                    'ground',
                    {
                        width: 100,
                        height: 100,
                    },
                    scene,
                );

                // Car body
                const car = BABYLON.MeshBuilder.CreateBox(
                    'car',
                    {
                        width: 2,
                        height: 1,
                        depth: 4,
                    },
                    scene,
                );

                car.position.y = 0.5;

                // Car color
                const material = new BABYLON.StandardMaterial(
                    'carColor',
                    scene,
                );

                material.diffuseColor = new BABYLON.Color3(1, 0, 0);

                car.material = material;

                // Camera follows car
                camera.lockedTarget = car;

                // Movement

                // 🚗 Better Car Movement

                let keys = {};

                let carSpeed = 0;
                let maxSpeed = 1;
                let acceleration = 0.02;
                let braking = 0.04;
                let turnSpeed = 0.04;

                window.addEventListener('keydown', (e) => {
                    keys[e.key.toLowerCase()] = true;
                });

                window.addEventListener('keyup', (e) => {
                    keys[e.key.toLowerCase()] = false;
                });

                // Speed display
                let speedText = document.createElement('div');

                speedText.style.position = 'absolute';
                speedText.style.top = '20px';
                speedText.style.left = '20px';
                speedText.style.color = 'white';
                speedText.style.fontSize = '25px';
                speedText.innerHTML = 'Speed: 0';

                document.body.appendChild(speedText);

                scene.onBeforeRenderObservable.add(() => {
                    // Accelerate
                    if (keys['w']) {
                        carSpeed += acceleration;
                    }

                    // Brake / Reverse
                    if (keys['s']) {
                        carSpeed -= braking;
                    }

                    // Natural slowing
                    if (!keys['w'] && !keys['s']) {
                        carSpeed *= 0.97;
                    }

                    // Speed limit
                    if (carSpeed > maxSpeed) {
                        carSpeed = maxSpeed;
                    }

                    if (carSpeed < -0.5) {
                        carSpeed = -0.5;
                    }

                    // Turning

                    if (keys['a']) {
                        car.rotation.y -= turnSpeed;
                    }

                    if (keys['d']) {
                        car.rotation.y += turnSpeed;
                    }

                    // Move forward based on car direction

                    car.moveWithCollisions(
                        new BABYLON.Vector3(
                            Math.sin(car.rotation.y) * carSpeed,
                            0,
                            Math.cos(car.rotation.y) * carSpeed,
                        ),
                    );

                    // Show speed

                    speedText.innerHTML =
                        'Speed: ' +
                        Math.round(Math.abs(carSpeed) * 100) +
                        ' km/h';
                });

                return scene;
            };

            const scene = createScene();

            engine.runRenderLoop(() => {
                scene.render();
            });

            window.addEventListener('resize', () => {
                engine.resize();
            });
        </script>
    </body>
</html>
